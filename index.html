<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버 가챠 머신</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .machine-container {
            position: relative;
            width: 415px;
            height: 704px;
            overflow: hidden;
            margin: 0 auto;
        }

        .layer {
            position: absolute;
            pointer-events: none;
        }

        /* 1단계: 배경 본체 */
        .base { 
            z-index: 1; 
            left: 0px; top: 0px;
            width: 415px; height: 704px;
        }

        /* 2단계: 가챠 캡슐 애니메이션 */
        .capsule-window {
            position: absolute;
            z-index: 2;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            left: 2px; top: 32px;
            width: 357px; height: 295px;
        }
        .capsule {
            width: 40px; height: 40px;
            background: radial-gradient(circle, #ff6b6b 50%, #feca57 50%);
            border-radius: 50%;
            display: none;
            animation: rolling 0.5s infinite linear;
        }
        @keyframes rolling {
            0% { transform: translateY(-50px) rotate(0deg); }
            50% { transform: translateY(20px) rotate(180deg); }
            100% { transform: translateY(50px) rotate(360deg); opacity: 0; }
        }

        /* 3단계: 투명창 (up.png) */
        .window-overlay { 
            z-index: 3; 
            left: 2px; top: 32px;
            width: 357px; height: 295px;
        }

        /* 4단계: 핸들 (handle.png) */
        .handle {
            position: absolute;
            z-index: 4;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-origin: center center; 
            left: 102px; top: 409px;  
            width: 90px; height: 91px;
        }
        .handle.spin {
            transform: rotate(360deg);
        }

        /* 5단계: 표지 등록 영역 (블랙박스) */
        .cover-area {
            position: absolute;
            z-index: 5;
            left: 17px; top: 30px;   
            width: 233px; height: 296px;
            cursor: pointer;
            pointer-events: auto; /* 클릭 가능하게 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cover-area:hover #default-black-bg {
            opacity: 0.8;
        }

        /* 표지 영역 내부 층 */
        #default-black-bg {
            position: absolute;
            z-index: 1; 
            width: 100%; height: 100%;
            transition: opacity 0.3s;
        }

        #cover-text {
            position: absolute;
            z-index: 2; 
            color: white;
            text-align: center;
            font-weight: bold;
            pointer-events: none;
        }

        #cover-img {
            position: absolute;
            z-index: 3; 
            width: 100%; height: 100%;
            object-fit: cover; /* 이미지가 네모 크기에 예쁘게 꽉 차게 */
            display: none; /* 처음엔 숨김 */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="machine-container">
        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/refs/heads/main/img/base.png" class="layer base" alt="본체">

        <div class="capsule-window">
            <div class="capsule" id="capsule"></div>
        </div>

        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/refs/heads/main/img/up.png" class="layer window-overlay" alt="투명창">

        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/refs/heads/main/img/handle.png" class="handle" id="handle" alt="핸들">

        <div class="cover-area" id="cover-btn" title="기계의 표지 이미지를 등록하세요">
            <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/refs/heads/main/img/image.png" id="default-black-bg" alt="검은화면">
            <div id="cover-text">클릭해서<br>표지 이미지 등록</div>
            <img id="cover-img" src="" alt="표지">
            
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
        </div>
    </div>

    <script>
        const handle = document.getElementById('handle');
        const capsule = document.getElementById('capsule');
        
        // 표지 등록 관련 요소들
        const coverBtn = document.getElementById('cover-btn');
        const fileInput = document.getElementById('image-upload');
        const coverImg = document.getElementById('cover-img');
        const coverText = document.getElementById('cover-text');
        const defaultBlackBg = document.getElementById('default-black-bg');

        let isSpinning = false;

        // 1. 검은 영역 클릭 시 파일 찾기 창 열기
        coverBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // 2. 파일 선택 시 표지에 이미지 씌우기
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0]; // 한 장만 가져오기
            if (file) {
                const fileURL = URL.createObjectURL(file);
                
                // 표지 이미지 태그에 등록한 사진 띄우기
                coverImg.src = fileURL;
                coverImg.style.display = 'block'; 
                
                // 기존 검은 배경과 글자는 숨기기
                defaultBlackBg.style.display = 'none';
                coverText.style.display = 'none';
            }
        });

        // 3. 핸들 애니메이션 (표지와는 별개로 돌아감)
        handle.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            handle.classList.add('spin');
            capsule.style.display = 'block';

            setTimeout(() => {
                handle.classList.remove('spin');
                capsule.style.display = 'none'; 
                isSpinning = false;
                
                // 💡 나중에 가챠 결과 개발하실 때 여기에 코드를 추가하시면 됩니다!
                console.log("나중에 가챠 뽑는 로직을 여기에 넣으세요!"); 
            }, 800);
        });
    </script>
</body>
</html>
