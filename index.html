<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버-자칼-가챠머신</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .machine-container {
            position: relative;
            width: 415px;
            height: 704px;
            overflow: hidden;
            margin: 0 auto;
            background: #f4f4f4;
        }

        .layer {
            position: absolute;
            pointer-events: none;
        }

        /* 1단계: 배경 본체 */
        .base { 
            z-index: 1; 
            left: 0; top: 0;
            width: 100%; height: 100%;
        }

        /* 2단계: 가챠 캡슐 영역 */
        .capsule-area {
            position: absolute;
            z-index: 2;
            left: 55px; top: 75px;
            width: 300px; height: 220px;
            overflow: hidden;
        }

        .shuffling-capsule {
            position: absolute;
            width: 50px; height: 50px;
            opacity: 0;
        }

        /* 섞이는 애니메이션 */
        @keyframes bounce {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(150px, 50px) rotate(90deg); }
            50% { transform: translate(80px, 150px) rotate(180deg); }
            75% { transform: translate(200px, 20px) rotate(270deg); }
        }

        /* 3단계: 투명창 */
        .window-overlay { 
            z-index: 3; 
            left: 2px; top: 32px;
            width: 357px; height: 295px;
        }

        /* 4단계: 핸들 */
        .handle {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-origin: center center; 
            left: 102px; top: 409px;  
            width: 90px; height: 91px;
        }
        .handle.spin { transform: rotate(360deg); }

        /* 5단계: 고정 표지 영역 */
        .cover-area {
            position: absolute;
            z-index: 5;
            left: 17px; top: 30px;   
            width: 233px; height: 296px;
            overflow: hidden;
            background-color: #f4f4f4;
        }
        
        .fixed-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 당첨 캡슐 결과창 */
        .result-capsule {
            position: absolute;
            z-index: 100;
            width: 60px; height: 60px;
            left: 80px; 
            top: 540px; 
            display: none;
            transform-origin: center center;
        }

        /* 데굴데굴 속도 업그레이드! (1.2s -> 0.8s) */
        @keyframes rollOut {
            0% { transform: scale(0.5) translate(0, 0) rotate(0deg); opacity: 0; }
            15% { transform: scale(1.2) translate(-10px, 80px) rotate(-90deg); opacity: 1; } 
            35% { transform: scale(1.2) translate(-35px, 50px) rotate(-180deg); } 
            55% { transform: scale(1.2) translate(-70px, 80px) rotate(-360deg); } 
            100% { transform: scale(1.2) translate(-130px, 80px) rotate(-720deg); opacity: 1; } 
        }

        /* 모달 스타일 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            max-width: 85%;
            max-height: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 10px;
            display: block;
        }

        /* 수정한 세련된 닫기 버튼 */
        .close-btn {
            position: absolute;
            top: -18px;
            right: -18px;
            width: 36px;
            height: 36px;
            background-color: #333;
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid #fff;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            transform: scale(1.1) rotate(90deg);
            background-color: #000;
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

        const resultModal = document.getElementById('result-modal');
        const finalGachaImg = document.getElementById('final-gacha-img');
        const closeModalBtn = document.getElementById('close-modal');

            "https://drive.google.com/uc?export=view&id=1i8nloMC1347Aub1rLRxmZegmKIihxv5-"
        ];

        let isSpinning = false;

        function initCapsules() {
            capsuleBox.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const img = document.createElement('img');
                img.src = capsuleImages[Math.floor(Math.random() * 9)];
                img.className = 'shuffling-capsule';
                img.style.left = Math.random() * 250 + 'px';
                img.style.top = Math.random() * 150 + 'px';
                capsuleBox.appendChild(img);
            }
        }
        initCapsules();

        closeModalBtn.addEventListener('click', () => {
            resultModal.style.display = 'none';
        });

        resultModal.addEventListener('click', (e) => {
            if(e.target === resultModal) {
                resultModal.style.display = 'none';
            }
        });

        handle.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            handle.classList.add('spin');
            
            const capsules = document.querySelectorAll('.shuffling-capsule');
            capsules.forEach((cap) => {
                cap.style.opacity = '1';
                cap.style.animation = `bounce ${0.1 + Math.random() * 0.1}s infinite alternate`;
            });

            // 0.6초 후 섞기 중단
            setTimeout(() => {
                handle.classList.remove('spin');
                
                capsules.forEach(cap => {
                    cap.style.animation = 'none';
                    cap.style.opacity = '0';
                });

                const winIdx = Math.floor(Math.random() * 9);
                resultImg.src = capsuleImages[winIdx];
                resultImg.style.display = 'block';
                
                // 굴러나오는 애니메이션 시간 0.8s
                resultImg.style.animation = 'rollOut 0.8s ease-out forwards';

                // 0.8초 후 결과 이미지 팝업
                setTimeout(() => {
                    isSpinning = false;
                    resultImg.style.display = 'none';
                    resultImg.style.animation = 'none';

                    const randomFinalIdx = Math.floor(Math.random() * finalImages.length);
                    const originalUrl = finalImages[randomFinalIdx];
                    const idMatch = originalUrl.match(/id=([^&]+)/);
                    let safeImageUrl = originalUrl;
                    
                    if (idMatch && idMatch[1]) {
                        safeImageUrl = `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w800`;
                    }

                    finalGachaImg.src = safeImageUrl;
                    resultModal.style.display = 'flex';

                }, 850); 

            }, 600); 
        });
    </script>
