<html lang="ko"><head>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px; /* 모바일 좌우 여백 확보 */
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .machine-container {
            position: relative;
            /* 모바일 대응: 화면보다 크면 줄어들고, 최대 415px까지만 커짐 */
            width: 100%;
            max-width: 415px;
            /* 원본 비율(415:704) 유지 */
            aspect-ratio: 415 / 704; 
            overflow: hidden;
            margin: 0 auto;
            background: #f4f4f4;
            /* box-shadow: 0 10px 30px rgba(0,0,0,0.1); */ /* 그림자 삭제 */
            /* border-radius: 20px; */ /* 외곽선 테두리 삭제 */
        }

        .layer {
            position: absolute;
            pointer-events: none;
        }

        .base { 
            z-index: 1; 
            left: 0; top: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .capsule-area {
            position: absolute;
            z-index: 2;
            left: 13.25%; top: 10.65%; /* %로 변환 */
            width: 72.3%; height: 31.25%;
            overflow: hidden;
        }

        .shuffling-capsule {
            position: absolute;
            width: 15%; height: auto; /* 고정 px에서 %로 */
            aspect-ratio: 1/1;
            opacity: 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100%, 50%) rotate(90deg); }
            50% { transform: translate(50%, 100%) rotate(180deg); }
            75% { transform: translate(150%, 20%) rotate(270deg); }
        }

        .window-overlay { 
            z-index: 3; 
            left: 0.5%; top: 4.5%;
            width: 86%; height: auto;
        }

        .handle {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-origin: center center; 
            left: 24.5%; top: 58.1%;  
            width: 21.7%; height: auto;
        }
        .handle.spin { transform: rotate(360deg); }

        .cover-area {
            position: absolute;
            z-index: 5;
            left: 4.1%; top: 4.2%;   
            width: 56.1%; height: 42%;
            overflow: hidden;
            background-color: #f4f4f4;
        }
        
        .fixed-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-capsule {
            position: absolute;
            z-index: 100;
            width: 14.5%; height: auto;
            aspect-ratio: 1/1;
            left: 19.3%; 
            top: 76.7%; 
            display: none;
        }

        @keyframes rollOut {
            0% { transform: scale(0.5) translate(0, 0) rotate(0deg); opacity: 0; }
            15% { transform: scale(1.2) translate(-10%, 150%) rotate(-90deg); opacity: 1; } 
            100% { transform: scale(1.2) translate(-150%, 150%) rotate(-720deg); opacity: 1; } 
        }

        /* 모달 스타일 (동일) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            max-width: 85%;
            max-height: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 10px;
            display: block;
        }

        .close-btn {
            position: absolute;
            top: -18px; right: -18px;
            width: 36px; height: 36px;
            background-color: #333;
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid #fff;
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>

        let isSpinning = false;

        function initCapsules() {
            capsuleBox.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const img = document.createElement('img');
                img.src = capsuleImages[Math.floor(Math.random() * 9)];
                img.className = 'shuffling-capsule';
                img.style.left = Math.random() * 80 + '%';
                img.style.top = Math.random() * 70 + '%';
                capsuleBox.appendChild(img);
            }
        }
        initCapsules();

        closeModalBtn.addEventListener('click', () => { resultModal.style.display = 'none'; });
        resultModal.addEventListener('click', (e) => { if(e.target === resultModal) resultModal.style.display = 'none'; });

        handle.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            playRandomClick();
            handle.classList.add('spin');
            
            const capsules = document.querySelectorAll('.shuffling-capsule');
            capsules.forEach((cap) => {
                cap.style.opacity = '1';
                cap.style.animation = `bounce ${0.1 + Math.random() * 0.1}s infinite alternate`;
            });

            setTimeout(() => {
                handle.classList.remove('spin');
                capsules.forEach(cap => { cap.style.animation = 'none'; cap.style.opacity = '0'; });

                const winIdx = Math.floor(Math.random() * 9);
                resultImg.src = capsuleImages[winIdx];
                resultImg.style.display = 'block';
                resultImg.style.animation = 'rollOut 0.8s ease-out forwards';

                setTimeout(() => {
                    isSpinning = false;
                    resultImg.style.display = 'none';
                    resultImg.style.animation = 'none';
                    const randomFinalIdx = Math.floor(Math.random() * finalImages.length);
                    const originalUrl = finalImages[randomFinalIdx];
                    const idMatch = originalUrl.match(/id=([^&]+)/);
                    let safeImageUrl = originalUrl;
                    if (idMatch && idMatch[1]) safeImageUrl = `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w800`;
                    finalGachaImg.src = safeImageUrl;
                    resultModal.style.display = 'flex';
                }, 850); 
            }, 600); 
        });
    </script>
