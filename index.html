<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버 가챠 머신</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .machine-container {
            position: relative;
            width: 415px; /* base.png 원본 비율에 맞춰 조정될 수 있음 */
            height: 704px;
            overflow: hidden;
            margin: 0 auto;
            background: #fff;
        }

        .layer {
            position: absolute;
            pointer-events: none;
        }

        /* 1단계: 배경 본체 */
        .base { 
            z-index: 1; 
            left: 0; top: 0;
            width: 100%; height: 100%;
        }

        /* 2단계: 가챠 캡슐들이 굴러다니는 영역 (up.png 뒤) */
        .capsule-area {
            position: absolute;
            z-index: 2;
            left: 55px; top: 75px; /* 투명창 위치에 맞게 조정 필요 */
            width: 300px; height: 220px;
            overflow: hidden;
        }

        .shuffling-capsule {
            position: absolute;
            width: 50px; height: 50px;
            opacity: 0;
        }

        /* 굴러다니는 애니메이션 */
        @keyframes bounce {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(150px, 50px) rotate(90deg); }
            50% { transform: translate(80px, 150px) rotate(180deg); }
            75% { transform: translate(200px, 20px) rotate(270deg); }
        }

        /* 3단계: 투명창 (up.png) - 캡슐 위에 덮임 */
        .window-overlay { 
            z-index: 3; 
            left: 2px; top: 32px;
            width: 357px; height: 295px;
        }

        /* 4단계: 핸들 */
        .handle {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-origin: center center; 
            left: 102px; top: 409px;  
            width: 90px; height: 91px;
        }
        .handle.spin { transform: rotate(360deg); }

        /* 5단계: 표지 영역 */
        .cover-area {
            position: absolute;
            z-index: 5;
            left: 17px; top: 30px;   
            width: 233px; height: 296px;
            cursor: pointer;
            pointer-events: auto;
            overflow: hidden;
        }
        #default-black-bg { width: 100%; height: 100%; object-fit: cover; }
        #cover-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        #cover-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; font-weight: bold; z-index: 6; }

        /* 당첨 캡슐 결과창 */
        .result-capsule {
            position: absolute;
            z-index: 100;
            width: 60px; height: 60px;
            left: 170px; top: 550px; /* 배출구 근처 시작점 */
            display: none;
            transition: all 1s ease-out;
        }

        /* 배출구로 나가는 애니메이션 */
        @keyframes exit {
            0% { transform: scale(0.5) translate(0, 0); opacity: 1; }
            100% { transform: scale(1.5) translate(-20px, 100px); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="machine-container">
        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/base.png" class="layer base">

        <div class="capsule-area" id="capsule-box">
            </div>

        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/up.png" class="layer window-overlay">

        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/handle.png" class="handle" id="handle">

        <img id="result-img" class="result-capsule" src="">

        <div class="cover-area" id="cover-btn">
            <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/image.png" id="default-black-bg">
            <div id="cover-text">클릭해서<br>표지 등록</div>
            <img id="cover-img" src="">
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
        </div>
    </div>

    <script>
        const handle = document.getElementById('handle');
        const capsuleBox = document.getElementById('capsule-box');
        const resultImg = document.getElementById('result-img');
        const fileInput = document.getElementById('image-upload');
        const coverImg = document.getElementById('cover-img');
        const coverBtn = document.getElementById('cover-btn');

        const capsuleImages = Array.from({length: 9}, (_, i) => `https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/gc${i+1}.png`);
        
        let isSpinning = false;

        // 초기 캡슐 세팅 (통 안에 미리 넣어두기)
        function initCapsules() {
            capsuleBox.innerHTML = '';
            for (let i = 0; i < 12; i++) { // 풍성해 보이게 12개 생성
                const img = document.createElement('img');
                img.src = capsuleImages[Math.floor(Math.random() * 9)];
                img.className = 'shuffling-capsule';
                img.style.left = Math.random() * 250 + 'px';
                img.style.top = Math.random() * 150 + 'px';
                capsuleBox.appendChild(img);
            }
        }
        initCapsules();

        // 핸들 클릭 이벤트
        handle.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            handle.classList.add('spin');
            
            // 1. 캡슐 굴러다니기 시작
            const capsules = document.querySelectorAll('.shuffling-capsule');
            capsules.forEach((cap, idx) => {
                cap.style.opacity = '1';
                cap.style.animation = `bounce ${0.4 + Math.random() * 0.2}s infinite alternate`;
            });

            // 2. 2초간 섞인 후 멈춤 및 당첨 결과 배출
            setTimeout(() => {
                handle.classList.remove('spin');
                
                // 섞이는 애니메이션 정지
                capsules.forEach(cap => {
                    cap.style.animation = 'none';
                    cap.style.opacity = '0';
                });

                // 당첨 캡슐 등장
                const winIdx = Math.floor(Math.random() * 9);
                resultImg.src = capsuleImages[winIdx];
                resultImg.style.display = 'block';
                resultImg.style.animation = 'exit 1.2s forwards';

                setTimeout(() => {
                    isSpinning = false;
                    alert('가챠 성공!');
                    resultImg.style.display = 'none';
                    resultImg.style.animation = 'none';
                }, 1500);

            }, 2000);
        });

        // 표지 등록 로직 유지
        coverBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                coverImg.src = URL.createObjectURL(file);
                coverImg.style.display = 'block';
                document.getElementById('cover-text').style.display = 'none';
            }
        });
    </script>
</body>
</html>
