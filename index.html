<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버 가챠 머신</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .machine-container {
            position: relative;
            width: 415px;
            height: 704px;
            overflow: hidden;
            margin: 0 auto;
            background: #f4f4f4;
        }

        .layer {
            position: absolute;
            pointer-events: none;
        }

        /* 1단계: 배경 본체 */
        .base { 
            z-index: 1; 
            left: 0; top: 0;
            width: 100%; height: 100%;
        }

        /* 2단계: 가챠 캡슐 영역 */
        .capsule-area {
            position: absolute;
            z-index: 2;
            left: 55px; top: 75px;
            width: 300px; height: 220px;
            overflow: hidden;
        }

        .shuffling-capsule {
            position: absolute;
            width: 50px; height: 50px;
            opacity: 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(150px, 50px) rotate(90deg); }
            50% { transform: translate(80px, 150px) rotate(180deg); }
            75% { transform: translate(200px, 20px) rotate(270deg); }
        }

        /* 3단계: 투명창 */
        .window-overlay { 
            z-index: 3; 
            left: 2px; top: 32px;
            width: 357px; height: 295px;
        }

        /* 4단계: 핸들 */
        .handle {
            position: absolute;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-origin: center center; 
            left: 102px; top: 409px;  
            width: 90px; height: 91px;
        }
        .handle.spin { transform: rotate(360deg); }

        /* 5단계: 고정 표지 영역 */
        .cover-area {
            position: absolute;
            z-index: 5;
            left: 17px; top: 30px;   
            width: 233px; height: 296px;
            overflow: hidden;
            background-color: #f4f4f4;
        }
        
        .fixed-cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 당첨 캡슐 결과창 (수정됨) */
        .result-capsule {
            position: absolute;
            z-index: 100;
            width: 60px; height: 60px;
            left: 175px; top: 560px; /* 배출구 위치 미세 조정 */
            display: none;
            transform-origin: center center; /* 회전축을 중앙으로 설정 */
        }

        /* 데굴데굴 굴러나오는 애니메이션 (수정됨) */
        @keyframes rollOut {
            0% { transform: scale(0.5) translate(0, 0) rotate(0deg); opacity: 0; }
            20% { transform: scale(1.2) translate(-10px, 60px) rotate(-120deg); opacity: 1; } /* 툭 떨어짐 */
            45% { transform: scale(1.2) translate(-25px, 40px) rotate(-200deg); } /* 바닥 맞고 첫 번째 튕김 */
            65% { transform: scale(1.2) translate(-40px, 70px) rotate(-280deg); } /* 다시 떨어짐 */
            85% { transform: scale(1.2) translate(-50px, 60px) rotate(-320deg); } /* 작게 두 번째 튕김 */
            100% { transform: scale(1.2) translate(-60px, 70px) rotate(-360deg); opacity: 1; } /* 최종 안착 */
        }
    </style>
</head>
<body>

    <div class="machine-container">
        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/base.png" class="layer base">
        <div class="capsule-area" id="capsule-box"></div>
        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/up.png" class="layer window-overlay">
        <img src="https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/handle.png" class="handle" id="handle">
        <img id="result-img" class="result-capsule" src="">

    <script>
        const handle = document.getElementById('handle');
        const capsuleBox = document.getElementById('capsule-box');
        const resultImg = document.getElementById('result-img');

        const capsuleImages = Array.from({length: 9}, (_, i) => `https://raw.githubusercontent.com/lilikkakkal-art/zakhal-machine/main/img/gc${i+1}.png`);
        
        let isSpinning = false;

        function initCapsules() {
            capsuleBox.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const img = document.createElement('img');
                img.src = capsuleImages[Math.floor(Math.random() * 9)];
                img.className = 'shuffling-capsule';
                img.style.left = Math.random() * 250 + 'px';
                img.style.top = Math.random() * 150 + 'px';
                capsuleBox.appendChild(img);
            }
        }
        initCapsules();

        handle.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            handle.classList.add('spin');
            
            const capsules = document.querySelectorAll('.shuffling-capsule');
            capsules.forEach((cap) => {
                cap.style.opacity = '1';
                cap.style.animation = `bounce ${0.4 + Math.random() * 0.2}s infinite alternate`;
            });

            setTimeout(() => {
                handle.classList.remove('spin');
                
                capsules.forEach(cap => {
                    cap.style.animation = 'none';
                    cap.style.opacity = '0';
                });

                const winIdx = Math.floor(Math.random() * 9);
                resultImg.src = capsuleImages[winIdx];
                resultImg.style.display = 'block';
                
                // 애니메이션 호출 부분 수정됨 (ease-out을 추가하여 끝으로 갈수록 부드럽게 감속)
                resultImg.style.animation = 'rollOut 1.2s ease-out forwards';

                setTimeout(() => {
                    isSpinning = false;
                    alert('가챠 성공!');
                    resultImg.style.display = 'none';
                    resultImg.style.animation = 'none';
                }, 1500);

            }, 2000);
        });
    </script>
</body>
</html>
